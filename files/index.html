<!DOCTYPE html>
<html lang="zh-cn">
<head>
    <link rel="icon" href="../image/jie.png" type="../image/x-icon">
    <meta charset="UTF-8">
    <title>JieXin Game</title><img src="" alt="">
    <meta name="author" content="Jiege & Xinge">
    <link href="../style.css" rel="stylesheet" type="text/css"/>
    <style>
        @keyframes scale{
            0%{
                transform: scale(1.0);
            }
            25%{
                transform: scale(1.05);
            }
            50%{
                transform: scale(1.07);
            }
            75%{
                transform: scale(1.09);
            }
            100%{
                transform: scale(1.1);
            }
        }
        
        table{
            border-collapse: collapse;
            position: fixed;
            color: white;
            top: 50px;
            left: 50px;
            border-bottom-color: #9ff5ff;
            border-radius: 20%;
        }
        .pvz{
            background-image:linear-gradient(
                #FFF476,#A15727
            );
            border-radius: 20px;
        }
        .game{
            transform: scale(1.0);
        }
        .game:hover{
            animation: scale 0.1s ease-in-out;
            transform: scale(1.1);
        }
        table, th, td {
            border: 1px solid black;
        }
        caption{
            left:1px;
        }
    </style>
</head>
<body>
    <logo><img class="logo" src="../image/logo.png" alt=""></logo>
    <header class="glow">
        <index class="header" onclick="window.location.href='../index.html'" type="button">主页</index>
        <download class="header" onclick="window.location.href='./index.html'"type="button">游戏</download>
        <chat class="header" onclick="window.location.href='../chat.html'"type="button">联系我们</chat>
        <donate class="header" onclick="window.location.href='../donate.html'"type="button">投喂</donate>
    </header>
    <table>
    <caption>
        <h1>游戏</h1>
    </caption>
    <tr>
        <td>
            <a href="./game_files/greenman.zip"><img class="game" src="../image/g.png" alt="Greenman"></a>
            <a href="./game_files/Ninja GayDen.zip"><img class="game" src="../image/n.png" alt="Ninja Gaiden"></a>
            <a href="./game_files/PVZ.zip"><img class="pvz game" src="../image/PVZ.png" alt="Plant VS Zombie"></a>
        </td>
    </tr>
    </table>
</body>
</html>
